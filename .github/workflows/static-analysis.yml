name: Static Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # clang-format: check that all C source and header files are formatted
  # -------------------------------------------------------------------------
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: "17"
          check-path: "."
          exclude-regex: "(build|_deps|test/platform_stubs|test/posix_config|tools/misra)"
          fallback-style: "none"   # Fail if .clang-format is missing

  # -------------------------------------------------------------------------
  # cppcheck: static analysis (portable, no compile needed)
  # -------------------------------------------------------------------------
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --std=c11 \
            --inline-suppr \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=preprocessorErrorDirective \
            --suppress=constParameter \
            --suppress=constParameterPointer \
            --suppress=constVariablePointer \
            --suppress=knownConditionTrueFalse \
            --suppress=normalCheckLevelMaxBranches \
            -D tskKERNEL_VERSION_MAJOR=11 \
            -I include/ \
            src/

  # -------------------------------------------------------------------------
  # clang-tidy: deep analysis against the host-test compile_commands.json
  # -------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build cmake clang-tidy

      - name: Configure (generates compile_commands.json)
        run: cmake --preset host-test

      - name: Run clang-tidy
        run: |
          find src -name "*.c" | xargs clang-tidy \
            -p build/host-test \
            --config-file=.clang-tidy \
            2>&1 | tee clang-tidy-output.txt
          # Fail if clang-tidy reported errors
          grep -q "error:" clang-tidy-output.txt && exit 1 || exit 0

      - name: Upload clang-tidy report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-output.txt

  # -------------------------------------------------------------------------
  # MISRA-C 2012: compliance check via cppcheck's misra addon.
  #
  # tools/misra/misra.json is committed (config only).
  # tools/misra/misra_rules.txt is NOT committed (copyrighted) — it is
  # decoded at runtime from the MISRA_RULES_B64 repository secret.
  #
  # To populate the secret (run once, from a machine that has the file):
  #   base64 -w0 tools/misra/misra_rules.txt | gh secret set MISRA_RULES_B64
  # -------------------------------------------------------------------------
  misra:
    name: MISRA-C 2012
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cppcheck

      - name: Decode MISRA rules
        run: |
          printf '%s' "${{ secrets.MISRA_RULES_B64 }}" | base64 -d > tools/misra/misra_rules.txt

      - name: Run MISRA-C 2012 check
        run: python3 tools/misra/run_misra_check.py --fetch-freertos
