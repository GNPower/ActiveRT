name: Static Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # clang-format: check that all C source and header files are formatted
  # -------------------------------------------------------------------------
  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run clang-format
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: "17"
          check-path: "."
          exclude-regex: "(build|_deps|test/platform_stubs)"
          fallback-style: "none"   # Fail if .clang-format is missing

  # -------------------------------------------------------------------------
  # cppcheck: static analysis (portable, no compile needed)
  # -------------------------------------------------------------------------
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --std=c11 \
            --inline-suppr \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            -I include/ \
            src/

  # -------------------------------------------------------------------------
  # clang-tidy: deep analysis against the host-test compile_commands.json
  # -------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build cmake clang-tidy

      - name: Configure (generates compile_commands.json)
        run: cmake --preset host-test

      - name: Run clang-tidy
        run: |
          find src -name "*.c" | xargs clang-tidy \
            -p build/host-test \
            --config-file=.clang-tidy \
            2>&1 | tee clang-tidy-output.txt
          # Fail if clang-tidy reported errors
          grep -q "error:" clang-tidy-output.txt && exit 1 || exit 0

      - name: Upload clang-tidy report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-output.txt
