name: Release

# Triggers when a version tag (e.g. v1.0.0) is pushed to any branch.
# Convention: tag the commit on main immediately after merging the release PR.
#
#   git tag v1.0.0
#   git push origin v1.0.0

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # Required to create a GitHub Release

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # Strip the leading 'v' → "1.0.0"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          python3 - <<'PYEOF'
          import re, os, sys

          version = os.environ.get("VERSION", "")
          with open("CHANGELOG.md") as f:
              content = f.read()

          # Match the section starting with ## [VERSION] through the next ## heading
          pattern = rf"(## \[{re.escape(version)}\][^\n]*\n)(.*?)(?=\n## |\Z)"
          m = re.search(pattern, content, re.DOTALL)

          if not m:
              print(f"Warning: no changelog entry found for [{version}]", file=sys.stderr)
              body = f"Release v{version}.\n\nSee [CHANGELOG.md](CHANGELOG.md) for details."
          else:
              body = m.group(1) + m.group(2).rstrip()

          with open("release_notes.md", "w") as f:
              f.write(body)
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ActiveRT v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}