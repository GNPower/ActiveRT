name: Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for `git describe` version detection

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build cmake

      - name: Configure (host-test preset)
        run: cmake --preset host-test

      - name: Build
        run: cmake --build --preset host-test

      - name: Run tests
        run: ctest --preset host-test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/host-test/Testing/

  build-and-test-windows:
    name: Build & Test (windows-latest)
    runs-on: windows-latest

    # Run every step in the MSYS2 UCRT64 shell so the MinGW-w64 gcc, cmake, and
    # ninja from the toolchain below are on PATH. ActiveRT builds against the
    # FreeRTOS Windows-simulator port (MSVC_MINGW), which the MinGW toolchain
    # drives directly — no Visual Studio install required.
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for `git describe` version detection

      - name: Set up MSYS2 / MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Configure (windows-test preset)
        run: cmake --preset windows-test

      - name: Build
        run: cmake --build --preset windows-test

      - name: Run tests
        run: ctest --preset windows-test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: build/windows-test/Testing/
